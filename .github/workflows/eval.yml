name: Eval

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  one-shot-rate:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: One-shot generation rate (KPI, never blocks)
        if: env.ANTHROPIC_API_KEY != ''
        run: pnpm eval
      - name: Skipped (no API key configured)
        if: env.ANTHROPIC_API_KEY == ''
        run: echo "ANTHROPIC_API_KEY secret not set — eval skipped."
