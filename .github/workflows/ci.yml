name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck (types + manifest contracts)
        run: pnpm typecheck
      - name: Tests
        run: pnpm test
      - name: Hard gate — token/component and bundle/component
        run: pnpm gate
      - name: Build (templates + manifests.json + dist)
        run: pnpm build
      - name: Smoke test (CLI + MCP)
        run: pnpm smoke
